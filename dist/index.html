<html>
  <body>
    <div id="affirm-apr-calculator"></div>
    <script src="./apr_calculator.js"></script>
    <script>
      // Builder API (recommended)
      AffirmAprCalculator
        .create({ apiKey: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' })
        .withPlans([
          { apr: 0.10, months: 12 },
          { apr: 0.10, months: 24 },
          { apr: 0.10, months: 36 },
          { apr: 0.20, months: 12 },
          { apr: 0.20, months: 24 },
          { apr: 0.20, months: 36 },
          { apr: 0.30, months: 12 },
          { apr: 0.30, months: 24 },
          { apr: 0.30, months: 36 },
        ])
        .withInitialState({ purchaseAmount: 1500, selectedApr: 0.10 })
        .withViewOptions({ title: "Here's what you'll pay" })
        .mount('#affirm-apr-calculator');
